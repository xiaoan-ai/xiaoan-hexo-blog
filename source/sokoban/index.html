<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sokoban · 小安 Game Room</title>
  <meta name="description" content="小安的独立 Sokoban 推箱子游戏页：纯游戏落地页，支持键盘与触屏操作。" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #090511;
      --bg-2: #1b1030;
      --panel: rgba(22, 12, 42, 0.76);
      --panel-2: rgba(25, 14, 48, 0.92);
      --line: rgba(255,255,255,.12);
      --text: #faf5ff;
      --muted: #d8b4fe;
      --pink: #f472b6;
      --purple: #8b5cf6;
      --gold: #fbbf24;
      --cyan: #67e8f9;
      --green: #34d399;
      --shadow: 0 28px 70px rgba(10, 5, 20, .52);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 16%, rgba(244,114,182,.18), transparent 24%),
        radial-gradient(circle at 86% 10%, rgba(139,92,246,.24), transparent 28%),
        radial-gradient(circle at 60% 88%, rgba(103,232,249,.14), transparent 24%),
        linear-gradient(145deg, #090511, #14091f 45%, #26123a);
    }
    .page {
      width: min(calc(100% - 32px), 1320px);
      margin: 0 auto;
      padding: 28px 0 42px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(22,12,42,.64);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      gap: 22px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }
    .hero {
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(244,114,182,.16), transparent 34%),
        radial-gradient(circle at 84% 16%, rgba(103,232,249,.16), transparent 24%),
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: auto, auto, 26px 26px, 26px 26px;
      pointer-events: none;
    }
    .eyebrow {
      position: relative;
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #fbcfe8;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: .08em;
    }
    h1 { position: relative; margin: 16px 0 10px; font-size: clamp(38px, 6vw, 66px); line-height: 1; }
    .hero p { position: relative; margin: 0; color: #f5dfff; line-height: 1.8; max-width: 780px; }
    .content { padding: 24px; display: grid; gap: 18px; }
    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 18px;
      align-items: start;
    }
    .board-shell {
      padding: 18px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.06);
    }
    #board {
      display: grid;
      gap: 6px;
      justify-content: start;
      align-content: start;
      user-select: none;
      touch-action: manipulation;
    }
    .cell {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 22px;
      transition: transform .12s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .floor { background: rgba(255,255,255,.06); }
    .wall { background: linear-gradient(135deg, #4c1d95, #6d28d9); }
    .target { background: linear-gradient(135deg, #fde68a, var(--gold)); color: #4c1d95; }
    .box { background: linear-gradient(135deg, #fb7185, var(--pink)); }
    .box.target { background: linear-gradient(135deg, #6ee7b7, var(--green)); }
    .player { background: linear-gradient(135deg, #a5f3fc, var(--cyan)); color: #0f172a; }
    .side-rail { display: grid; gap: 12px; }
    .rail-card, .message, .stat, .legend-item {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.06);
    }
    .controls, .stats { display: flex; flex-wrap: wrap; gap: 10px; }
    .stats .stat { min-width: 110px; }
    .btn {
      border: none;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      font: inherit;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      box-shadow: 0 14px 28px rgba(244,114,182,.2);
    }
    .btn.secondary {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: none;
    }
    .legend { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .legend-item { display: flex; align-items: center; gap: 10px; color: #f5dfff; }
    .dot { width: 20px; height: 20px; border-radius: 7px; display: inline-block; }
    .pad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }
    .pad .btn { padding: 0; min-height: 64px; font-size: 22px; border-radius: 18px; }
    .message { color: #ffe4f4; line-height: 1.7; min-height: 56px; }
    .tips p, li { color: #f5dfff; line-height: 1.8; }
    @media (max-width: 1100px) {
      .layout, .stage { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .page { width: min(calc(100% - 20px), 1320px); padding-top: 18px; }
      .hero, .content { padding: 18px; }
      .cell { width: 38px; height: 38px; font-size: 18px; }
      .pad { grid-template-columns: repeat(3, 56px); }
      .pad .btn { min-height: 56px; }
      .legend { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="chip" href="/xiaoan-hexo-blog/games/">← 返回 Games Portal</a>
      <a class="chip" href="/xiaoan-hexo-blog/">博客首页</a>
    </div>

    <section class="layout">
      <section class="panel">
        <div class="hero">
          <span class="eyebrow">Sokoban / Puzzle / Pure Landing Page</span>
          <h1>推箱子</h1>
          <p>把 Sokoban 一起纳入独立作品体系。页面不再像文章内容块，而是直接展示游戏舞台、关卡控制、成绩信息和玩法说明。</p>
        </div>

        <div class="content">
          <div class="controls">
            <button class="btn" id="restartBtn">重新开始</button>
            <button class="btn secondary" id="prevBtn">上一关</button>
            <button class="btn secondary" id="nextBtn">下一关</button>
          </div>

          <div class="stats">
            <div class="stat">关卡：<strong id="levelText"></strong></div>
            <div class="stat">步数：<strong id="stepsText">0</strong></div>
            <div class="stat">最佳：<strong id="bestText">-</strong></div>
          </div>

          <div class="stage">
            <div class="board-shell"><div id="board"></div></div>
            <aside class="side-rail">
              <div class="rail-card">
                <strong>方向键</strong>
                <div class="pad">
                  <div></div><button class="btn secondary" data-dir="up">↑</button><div></div>
                  <button class="btn secondary" data-dir="left">←</button><button class="btn secondary" data-dir="down">↓</button><button class="btn secondary" data-dir="right">→</button>
                </div>
              </div>
              <div class="message" id="message">方向键 / WASD 都可以移动，R 可以重开。</div>
            </aside>
          </div>
        </div>
      </section>

      <aside class="panel" style="padding:24px; display:grid; gap:18px; align-content:start;">
        <section>
          <h3 style="margin:0 0 12px;">图例</h3>
          <div class="legend">
            <div class="legend-item"><span class="dot" style="background:linear-gradient(135deg,#4c1d95,#6d28d9)"></span>墙</div>
            <div class="legend-item"><span class="dot" style="background:rgba(255,255,255,.15)"></span>地板</div>
            <div class="legend-item"><span class="dot" style="background:linear-gradient(135deg,#fde68a,#fbbf24)"></span>目标点</div>
            <div class="legend-item"><span class="dot" style="background:linear-gradient(135deg,#fb7185,#f472b6)"></span>箱子</div>
            <div class="legend-item"><span class="dot" style="background:linear-gradient(135deg,#6ee7b7,#34d399)"></span>已归位箱子</div>
            <div class="legend-item"><span class="dot" style="background:linear-gradient(135deg,#a5f3fc,#67e8f9)"></span>你</div>
          </div>
        </section>
        <section class="tips">
          <h3 style="margin:0 0 10px;">玩法说明</h3>
          <ul>
            <li>一次只能推动一个箱子。</li>
            <li>不能拉箱子，也不能穿墙。</li>
            <li>把全部箱子推到目标点就算过关。</li>
          </ul>
          <p>小提示：先想退路，再推箱子。死角永远比你想得更近。</p>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const levels = [
      [
        '########',
        '#..#...#',
        '#..$...#',
        '#. $@ .#',
        '#..#...#',
        '#.. . .#',
        '########'
      ],
      [
        '#########',
        '#   #   #',
        '# $   $ #',
        '# .#@#. #',
        '#   .   #',
        '#########'
      ],
      [
        '##########',
        '#   .    #',
        '# $$#$$  #',
        '#  .@.   #',
        '#   #    #',
        '#   .    #',
        '##########'
      ]
    ];

    const boardEl = document.getElementById('board');
    const messageEl = document.getElementById('message');
    const stepsEl = document.getElementById('stepsText');
    const levelEl = document.getElementById('levelText');
    const bestEl = document.getElementById('bestText');
    let levelIndex = 0;
    let map = [];
    let steps = 0;

    function keyBest() { return `xiaoan-sokoban-best-${levelIndex}`; }
    function getBest() {
      const val = localStorage.getItem(keyBest());
      return val ? Number(val) : null;
    }
    function setBest(stepCount) {
      const best = getBest();
      if (!best || stepCount < best) localStorage.setItem(keyBest(), String(stepCount));
    }

    function loadLevel(index) {
      levelIndex = (index + levels.length) % levels.length;
      map = levels[levelIndex].map(row => row.split(''));
      steps = 0;
      updateTexts();
      messageEl.textContent = '好啦，开始推箱子吧。别把箱子顶进角落啦。';
      render();
    }

    function updateTexts() {
      stepsEl.textContent = steps;
      levelEl.textContent = `${levelIndex + 1} / ${levels.length}`;
      bestEl.textContent = getBest() ?? '-';
    }

    function findPlayer() {
      for (let y = 0; y < map.length; y++) {
        for (let x = 0; x < map[y].length; x++) {
          if (map[y][x] === '@' || map[y][x] === '+') return { x, y };
        }
      }
    }

    function render() {
      boardEl.innerHTML = '';
      const cols = Math.max(...map.map(r => r.length));
      boardEl.style.gridTemplateColumns = `repeat(${cols}, auto)`;

      for (let y = 0; y < map.length; y++) {
        for (let x = 0; x < cols; x++) {
          const ch = map[y][x] || ' ';
          const cell = document.createElement('div');
          cell.className = 'cell';

          if (ch === '#') {
            cell.classList.add('wall');
          } else if (ch === '.') {
            cell.classList.add('target');
            cell.textContent = '✦';
          } else if (ch === '$') {
            cell.classList.add('box');
            cell.textContent = '📦';
          } else if (ch === '*') {
            cell.classList.add('box', 'target');
            cell.textContent = '📦';
          } else if (ch === '@') {
            cell.classList.add('player');
            cell.textContent = '◉';
          } else if (ch === '+') {
            cell.classList.add('player', 'target');
            cell.textContent = '◉';
          } else {
            cell.classList.add('floor');
          }
          boardEl.appendChild(cell);
        }
      }
    }

    function isFree(ch) { return ch === ' ' || ch === '.'; }
    function isBox(ch) { return ch === '$' || ch === '*'; }

    function move(dir) {
      const d = { up: [0, -1], down: [0, 1], left: [-1, 0], right: [1, 0] }[dir];
      if (!d) return;

      const p = findPlayer();
      const [dx, dy] = d;
      const ny = p.y + dy, nx = p.x + dx;
      const beyondY = p.y + dy * 2, beyondX = p.x + dx * 2;
      const next = map[ny]?.[nx] ?? '#';
      const beyond = map[beyondY]?.[beyondX] ?? '#';
      const leaveBehind = map[p.y][p.x] === '+' ? '.' : ' ';

      if (next === '#') return;
      if (isFree(next)) {
        map[p.y][p.x] = leaveBehind;
        map[ny][nx] = next === '.' ? '+' : '@';
        steps++;
      } else if (isBox(next) && isFree(beyond)) {
        map[p.y][p.x] = leaveBehind;
        map[ny][nx] = next === '*' ? '+' : '@';
        map[beyondY][beyondX] = beyond === '.' ? '*' : '$';
        steps++;
      } else {
        return;
      }

      updateTexts();
      render();
      checkWin();
    }

    function checkWin() {
      const leftBoxes = map.flat().some(ch => ch === '$');
      if (!leftBoxes) {
        setBest(steps);
        updateTexts();
        messageEl.textContent = `过关啦！这一关你用了 ${steps} 步，真厉害 ✨`;
        setTimeout(() => loadLevel(levelIndex + 1), 900);
      }
    }

    document.addEventListener('keydown', (e) => {
      const keyMap = {
        ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
        w: 'up', s: 'down', a: 'left', d: 'right',
        W: 'up', S: 'down', A: 'left', D: 'right'
      };
      if (e.key === 'r' || e.key === 'R') {
        loadLevel(levelIndex);
        return;
      }
      const dir = keyMap[e.key];
      if (dir) {
        e.preventDefault();
        move(dir);
      }
    });

    document.querySelectorAll('[data-dir]').forEach(btn => {
      btn.addEventListener('click', () => move(btn.dataset.dir));
    });
    document.getElementById('restartBtn').addEventListener('click', () => loadLevel(levelIndex));
    document.getElementById('prevBtn').addEventListener('click', () => loadLevel(levelIndex - 1));
    document.getElementById('nextBtn').addEventListener('click', () => loadLevel(levelIndex + 1));

    loadLevel(0);
  </script>
</body>
</html>
